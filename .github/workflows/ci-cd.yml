name: React CI/CD Pipeline

on:
    push:
        branches: [ "main" ]

env:
    IMAGE_NAME: react-landing-page

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3
            
            - name: Setup Node js
              uses: actions/setup-node@v3
              with:
                node-version: '20'
            
            - name: Cache Dependencies
              uses: actions/cache@v3
              with:
                path: ~/.npm
                key: ${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm install

            - name: Run Build
              run: npm run build

 # Docker Build and push
    docker:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v3

            - name: Set Version Tag
              run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build docker image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .

            - name: Push Docker Image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}


    # Deploy to ec2 instance
    deploy:
        needs: docker
        runs-on: ubuntu-latest

        steps:
            - name: Set Version Tag
              run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v0.1.7
              with:
                host: ${{ secrets.EC2_HOST }}
                key: ${{ secrets.EC2_KEY }}
                script: |
                  docker stop react-landing-page || true
                  docker rm react-landing-page || true
                  docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${TAG}
                  docker run -d -p 80:80 --name react-landing-page ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${TAG}


              
          